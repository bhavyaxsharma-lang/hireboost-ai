kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
# Build the React frontend first, then the API server.
# PORT and BASE_PATH are required by the Vite config even during a build.
args = ["sh", "-c", "PORT=22412 BASE_PATH=/ pnpm --filter @workspace/hireboost-ai run build && pnpm --filter @workspace/api-server run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# Run through node directly (not pnpm) for a faster cold start.
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
